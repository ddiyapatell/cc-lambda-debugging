name: tester
on:
  pull_request:
    branches:
      - 'contestant/**'
jobs: 
  test-validator:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tests
    steps:
      - name: Checkout to working directory
        uses: actions/checkout@v5
      - name: Run Easy tests
        run: python3 test_lambda_function1.py
      - name: Run Medium tests
        run: python3 medium/test_lambda_function2.py
      - name: Run Hard tests
        run: python3 hard/test_lambda_function3.py